<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时空同步安全随机数</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========================================
     登录界面
     ======================================== -->
<div class="login-container" id="loginContainer">
    <h1>统一安全认证系统</h1>

    <div class="input-group">
        <input type="text" id="usernameInput" class="password-input" placeholder="请输入用户名" autocomplete="off">
    </div>

    <div class="input-group">
        <input type="password" id="passwordInput" class="password-input" placeholder="请输入访问密码" autocomplete="off">
    </div>

    <div class="input-group">
        <input type="text" id="filePathDisplay" class="password-input" placeholder="未选择文件" readonly>
        <button class="file-input-btn" id="fileInputBtn">读取文件</button>
        <input type="file" id="fileInput" class="file-input-hidden" accept=".txt">
    </div>

    <div class="btn-container" id="btnContainer">
        <button class="login-btn" id="loginBtn">进入系统</button>
        <button class="save-btn" id="saveBtn">保存验证文件</button>
    </div>

    <div class="error-message" id="loginError"></div>
    <div class="success-message" id="loginSuccess"></div>
</div>

<!-- ========================================
     主界面
     ======================================== -->
<div class="main-container" id="mainContainer">
    <h1>时空同步安全随机数</h1>
    <div class="user-greeting" id="userGreeting"></div>

    <div class="timezone-select">
        <select id="timezoneSelect">
            <option value="0">UTC+0 伦敦</option>
            <option value="8" selected>UTC+8 北京</option>
            <option value="-5">UTC-5 纽约</option>
            <option value="9">UTC+9 东京</option>
            <option value="1">UTC+1 巴黎</option>
        </select>
    </div>

    <div class="digital-display">
        <div class="digital-number" id="randomNumber">
            <div class="digit-column"><div class="digit-scroll">-</div></div>
            <div class="digit-column"><div class="digit-scroll">-</div></div>
            <div class="digit-column"><div class="digit-scroll">-</div></div>
            <div class="digit-column"><div class="digit-scroll">-</div></div>
            <div class="digit-column"><div class="digit-scroll">-</div></div>
            <div class="digit-column"><div class="digit-scroll">-</div></div>
        </div>
    </div>

    <div class="time-info">
        <div class="time-box">
            <div>服务器时间</div>
            <div id="serverTime">00:00:00</div>
        </div>
        <div class="time-box">
            <div>剩余时间</div>
            <div id="timeRemaining">60秒</div>
        </div>
        <div class="time-box">
            <div>您的时区</div>
            <div id="userTimezone">UTC+8</div>
        </div>
    </div>

    <div class="controls">
        <button id="syncBtn" class="glow">同步时间</button>
        <button id="copyBtn">复制号码</button>
    </div>
</div>

<!-- ========================================
     JavaScript (load order matters)
     ======================================== -->
<script src="js/config.js"></script>
<script src="js/val.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<!-- ========================================
     登录界面逻辑
     ======================================== -->
<script>
(function() {
    var loginContainer = document.getElementById('loginContainer');
    var mainContainer = document.getElementById('mainContainer');
    var usernameInput = document.getElementById('usernameInput');
    var passwordInput = document.getElementById('passwordInput');
    var loginBtn = document.getElementById('loginBtn');
    var saveBtn = document.getElementById('saveBtn');
    var loginError = document.getElementById('loginError');
    var loginSuccess = document.getElementById('loginSuccess');
    var fileInputBtn = document.getElementById('fileInputBtn');
    var fileInput = document.getElementById('fileInput');
    var filePathDisplay = document.getElementById('filePathDisplay');

    var pendingLogin = false;

    function showSaveButton() {
        saveBtn.style.display = 'block';
        loginSuccess.textContent = '密码正确，请保存验证文件或再次点击进入系统';
        loginError.textContent = '';
        pendingLogin = true;
    }

    function enterSystem() {
        loginContainer.style.display = 'none';
        mainContainer.style.display = 'block';
        initApp();
    }

    loginBtn.addEventListener('click', function() {
        var username = usernameInput.value.trim().toLowerCase();
        var password = passwordInput.value;

        if (pendingLogin && validateCredentials(username, password)) {
            currentUser = username;
            enterSystem();
            return;
        }

        if (validateCredentials(username, password)) {
            currentUser = username;
            showSaveButton();
        } else {
            if (!username) {
                loginError.textContent = '请输入用户名';
            } else if (!accounts[username]) {
                loginError.textContent = '用户不存在';
            } else {
                loginError.textContent = '密码错误，请重试';
            }
            loginSuccess.textContent = '';
            passwordInput.value = '';
            passwordInput.focus();
            pendingLogin = false;
            saveBtn.style.display = 'none';
        }
    });

    saveBtn.addEventListener('click', async function() {
        var username = usernameInput.value.trim().toLowerCase();
        var password = passwordInput.value;

        if (!validateCredentials(username, password)) {
            loginError.textContent = '凭证无效，无法保存';
            return;
        }

        try {
            await saveAuthFile(username);
            loginSuccess.textContent = '验证文件已保存为 auth_' + username + '.txt，再次点击进入系统';
            loginError.textContent = '';
            currentUser = username;
        } catch (error) {
            loginError.textContent = '保存失败: ' + error.message;
            loginSuccess.textContent = '';
        }
    });

    passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') loginBtn.click();
    });

    usernameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') passwordInput.focus();
    });

    fileInputBtn.addEventListener('click', function() {
        fileInput.click();
    });

    fileInput.addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if (!file) return;

        if (!file.name.endsWith('.txt')) {
            loginError.textContent = '请选择有效的.txt文件';
            return;
        }

        filePathDisplay.value = file.name;

        try {
            var content = await readFileAsText(file);
            var result = await validateAuthFile(content);

            if (result.valid) {
                loginError.textContent = '';
                loginSuccess.textContent = '验证文件有效，正在登录 ' + result.username + '...';
                currentUser = result.username;
                usernameInput.value = result.username;
                setTimeout(function() { enterSystem(); }, 500);
            } else {
                loginError.textContent = '验证文件无效';
                loginSuccess.textContent = '';
            }
        } catch (error) {
            console.error('文件读取错误:', error);
            loginError.textContent = '文件读取失败';
        }
    });

    usernameInput.focus();

    if (!window.crypto || !window.crypto.subtle) {
        loginError.textContent = '需要通过 HTTPS 或 localhost 访问才能使用加密功能';
        loginError.style.color = '#FF6B6B';
    }
})();
</script>

</body>
</html>
