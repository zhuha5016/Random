<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>时空同步安全随机数</title>
<style>
:root {
    --primary: #2E7D32;
    --dark: #1B5E20;
    --light: #E8F5E9;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #FF9A9E, #FAD0C4, #A6C1EE);
    background-size: 300% 300%;
    animation: bgMove 15s infinite alternate;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Roboto', sans-serif;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

.card {
    background: rgba(0,0,0,0.75);
    border-radius: 12px;
    padding: 40px;
    width: 420px;
    color: white;
    text-align: center;
    border: 2px solid var(--primary);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

h1 {
    font-size: 1.6rem;
    margin-bottom: 30px;
    letter-spacing: 2px;
}

.digit {
    font-family: 'Courier New', monospace;
    font-size: 3.6rem;
    letter-spacing: 10px;
    background: black;
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
    border: 4px solid #333;
}

.info {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    margin-top: 20px;
}

select {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    font-size: 1rem;
    margin-top: 10px;
    background: var(--primary);
    color: white;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="card">
    <h1>时空同步安全随机数</h1>

    <select id="tz">
        <option value="UTC+8" selected>UTC+8 北京</option>
        <option value="UTC+0">UTC+0 伦敦</option>
        <option value="UTC-5">UTC-5 纽约</option>
        <option value="UTC+9">UTC+9 东京</option>
        <option value="UTC+1">UTC+1 巴黎</option>
    </select>

    <div class="digit" id="val">------</div>

    <div class="info">
        <div>服务器时间<br><span id="time">00:00:00</span></div>
        <div>剩余<br><span id="left">60秒</span></div>
        <div>时区<br><span id="tzLabel">UTC+8</span></div>
    </div>
</div>

<script>
const tzSel = document.getElementById('tz');

async function loadVAL() {
    const tz = tzSel.value;
    const res = await fetch(`api/val.html?tz=${tz}`);
    const data = await res.json();

    document.getElementById('val').innerText = data.val;
    document.getElementById('time').innerText = data.server_time;
    document.getElementById('left').innerText = data.expire_in + '秒';
    document.getElementById('tzLabel').innerText = tz;
}

tzSel.onchange = loadVAL;
loadVAL();
setInterval(loadVAL, 1000);
</script>

</body>
</html>
