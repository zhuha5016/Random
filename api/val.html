<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>VAL API</title>
</head>
<body>
<script>
/* ✅ 严格按分钟生成 VAL */
const tz = new URLSearchParams(location.search).get('tz') || 'UTC+8';

const offsetMap = {
    'UTC+0': 0,
    'UTC+8': 8 * 60,
    'UTC-5': -5 * 60,
    'UTC+9': 9 * 60,
    'UTC+1': 1 * 60
};

const now = new Date();
const utc = now.getTime() + now.getTimezoneOffset() * 60000;
const local = new Date(utc + (offsetMap[tz] || 0) * 60000);

/* ✅ 关键：只使用分钟 */
const minuteSeed = Math.floor(local.getTime() / 60000);
const val = ('000000' + (minuteSeed % 1000000)).slice(-6);

const data = {
    val: val,
    tz: tz,
    server_time: local.toLocaleTimeString('en-US', { hour12: false }),
    expire_in: 60 - local.getSeconds()
};

document.body.innerText = JSON.stringify(data);
</script>
</body>
</html>
